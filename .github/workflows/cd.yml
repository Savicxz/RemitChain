name: CD

on:
  push:
    tags:
      - build-*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/relayer/package-lock.json
            subquery/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build web
        run: npm run build

      - name: Install relayer dependencies
        run: npm ci --prefix services/relayer

      - name: Build relayer
        run: npm run build --prefix services/relayer

      - name: Install subquery dependencies
        run: npm ci --prefix subquery

      - name: Build subquery
        run: |
          npm run codegen --prefix subquery
          npm run build --prefix subquery

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/web-next.tar.gz .next package.json package-lock.json next.config.js
          tar -czf artifacts/relayer-dist.tar.gz services/relayer/dist services/relayer/package.json services/relayer/package-lock.json
          tar -czf artifacts/subquery-dist.tar.gz subquery/dist subquery/project.ts subquery/project.yaml subquery/schema.graphql

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remitchain-build-${{ github.run_number }}
          path: artifacts/*.tar.gz

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*.tar.gz
